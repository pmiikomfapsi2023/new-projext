<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keamanan Akun - PMII Komfapsi</title>
    <link rel="icon" type="image/png" href="Untitled design.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-pmii-blue { background-color: #003399; }
        .bg-pmii-dark { background-color: #001b5e; }
        .text-pmii-blue { color: #003399; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col">

    <nav class="fixed top-0 left-0 right-0 w-full z-50 glass-nav border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-gray-600 hover:text-pmii-blue transition group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="font-semibold text-sm">Kembali ke Beranda</span>
            </a>
            <div class="font-bold text-pmii-dark text-sm tracking-widest uppercase hidden md:block">Pengaturan Akun</div>
            <div class="w-24"></div> </div>
    </nav>

    <div class="flex-grow flex items-center justify-center p-6 mt-16">
        <div class="bg-white rounded-3xl p-8 md:p-10 border border-gray-100 shadow-xl max-w-md w-full relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-10 opacity-70"></div>

            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-pmii-blue rounded-full flex items-center justify-center text-3xl mx-auto mb-4 border border-blue-100">
                    🛡️
                </div>
                <h2 class="text-2xl font-extrabold text-gray-900 tracking-tight">Keamanan Akun</h2>
                <p class="text-sm text-gray-500 mt-2">Halo Sahabat <span id="namaPanggilan" class="font-bold text-pmii-blue"></span>, silakan perbarui kata sandi Portal Kadermu di bawah ini.</p>
            </div>

            <form id="formGantiPassword" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Password Lama</label>
                    <input type="password" id="oldPass" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-pmii-blue focus:border-pmii-blue focus:bg-white transition-all shadow-sm"
                        placeholder="Masukkan sandi saat ini">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Password Baru</label>
                    <input type="password" id="newPass" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-pmii-blue focus:border-pmii-blue focus:bg-white transition-all shadow-sm"
                        placeholder="Masukkan sandi baru">
                </div>
                <button type="submit" id="btnGantiPass" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-blue-900/20 text-sm font-bold text-white bg-pmii-blue hover:bg-pmii-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pmii-blue transform transition-all duration-200 hover:-translate-y-0.5 mt-4">
                    Simpan Password Baru
                </button>
                
                <p id="pesanSandi" class="text-sm font-bold text-center hidden mt-4 bg-gray-50 p-3 rounded-lg"></p>
            </form>
        </div>
    </div>

    <footer class="bg-gray-900 text-gray-400 py-6 text-center mt-auto">
        <p class="text-sm">&copy; 2026 PMII Komfapsi. Sistem Informasi Terpadu.</p>
    </footer>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT-MU DI DALAM TANDA KUTIP DI BAWAH INI
        const urlScriptSandi = 'https://script.google.com/macros/s/AKfycbzkRf-oOrzjhNnDhvtBK3iNrDw-FKpHiRJKcFgj0c0bRkiH5zNxfUgi-N1ESvTGdOTbXw/exec';

        // Pengecekan Keamanan: Jika belum login, tendang kembali ke index
        const userKader = localStorage.getItem('usernameKader');
        const namaKader = localStorage.getItem('namaKader');
        
        if (!userKader || !namaKader) {
            window.location.href = 'index.html';
        } else {
            // Tampilkan nama depan kader
            document.getElementById('namaPanggilan').innerText = namaKader.split(' ')[0];
        }

        const formGanti = document.getElementById('formGantiPassword');
        
        formGanti.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGantiPass');
            const pesan = document.getElementById('pesanSandi');
            const oldPass = document.getElementById('oldPass').value;
            const newPass = document.getElementById('newPass').value;

            btn.disabled = true;
            btn.innerHTML = "Menyimpan Perubahan...";
            pesan.classList.add('hidden');

            const formData = new URLSearchParams();
            formData.append('action', 'change_password');
            formData.append('username', userKader);
            formData.append('old_password', oldPass);
            formData.append('new_password', newPass);

            fetch(urlScriptSandi, { 
                method: 'POST', 
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(res => res.json())
            .then(data => {
                pesan.classList.remove('hidden');
                pesan.classList.remove('bg-gray-50', 'bg-red-50', 'bg-green-50', 'text-red-600', 'text-green-600');

                if(data.status === 'success') {
                    pesan.innerText = "✅ " + data.message;
                    pesan.classList.add('bg-green-50', 'text-green-600');
                    formGanti.reset();
                    
                    // Otomatis kembali ke dashboard setelah 2 detik
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    pesan.innerText = "❌ " + data.message;
                    pesan.classList.add('bg-red-50', 'text-red-600');
                }
                btn.disabled = false;
                btn.innerHTML = "Simpan Password Baru";
            })
            .catch(error => {
                pesan.innerText = "❌ Koneksi terputus. Coba lagi.";
                pesan.classList.remove('hidden', 'bg-gray-50');
                pesan.classList.add('bg-red-50', 'text-red-600');
                btn.disabled = false;
                btn.innerHTML = "Simpan Password Baru";
            });
        });
    </script>
</body>
</html>
